server {
    listen 80;
    listen [::]:80;
    server_name strategyht.angra.io;

    root /var/www/strategyht.angra.io;
    index index.html;

    access_log /var/log/nginx/strategyht.angra.io.access.log;
    error_log /var/log/nginx/strategyht.angra.io.error.log;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/strategyht.angra.io;
        default_type "text/plain";
        try_files $uri =404;
    }

    location /api/ {
        proxy_pass http://127.0.0.1:3026;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(?:css|js|png|svg|webp|ico|pdf)$ {
        try_files $uri =404;
        access_log off;
        expires 1h;
        add_header Cache-Control "public";
    }
}
